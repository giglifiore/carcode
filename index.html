<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CodeWorld</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

#panel{
position:absolute;
right:0;
top:0;
width:360px;
height:100%;
background:#1e1e1e;
padding:15px;
overflow:auto;
}

textarea{
width:100%;
height:180px;
background:black;
color:#00ff88;
font-family:monospace;
}

button{
width:100%;
padding:8px;
margin-top:6px;
background:#333;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#555;
}

.robotItem{
background:#222;
padding:10px;
margin-bottom:8px;
}

#stats{
background:#000;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div id="panel">

<h2>🌍 CodeWorld</h2>

<div id="user">Not logged</div>

<button onclick="login()">Login Google</button>

<button onclick="spawnRobot()">Spawn Robot</button>

<h3>My Robots</h3>
<div id="robotList"></div>

<h3>Robot Code</h3>

<textarea id="code">

if(scan("resource")){
  mine()
}else{
  moveRandom()
}

</textarea>

<button onclick="saveCode()">Save Code</button>

<div id="stats"></div>

</div>

<script>

////////////////////////
// FIREBASE
////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCOHwfHnIJOrnqlNHsAlMH9MI3Hx7M7wcw",
  authDomain: "carcode-58d5d.firebaseapp.com",
  projectId: "carcode-58d5d",
  storageBucket: "carcode-58d5d.appspot.com",
  messagingSenderId: "1034810624105",
  appId: "1:1034810624105:web:4e960e4864ee332e63baf8"
};

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.firestore()

let currentUser=null

auth.onAuthStateChanged(user=>{

if(user){

currentUser=user

document.getElementById("user").innerText=
"Player: "+user.displayName

renderRobotList()

}

})

function login(){

const provider=new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)

}

////////////////////////
// WORLD
////////////////////////

const gridSize=40
const tile=20

let robots=[]
let resources=[]
let selectedRobot=null

function setup(){

createCanvas(window.innerWidth-360,window.innerHeight)

generateResources()

loadRobots()

}

////////////////////////
// RESOURCES
////////////////////////

function generateResources(){

for(let i=0;i<200;i++){

resources.push({

x:floor(random(gridSize)),
y:floor(random(gridSize)),
amount:100

})

}

}

////////////////////////
// ROBOTS
////////////////////////

function spawnRobot(){

if(!currentUser)return alert("login first")

const code=document.getElementById("code").value

const robot={

owner:currentUser.uid,
name:currentUser.displayName,

x:floor(random(gridSize)),
y:floor(random(gridSize)),

energy:100,
resources:0,

code:code

}

db.collection("robots").add(robot)

}

function loadRobots(){

db.collection("robots").onSnapshot(snap=>{

robots=[]

snap.forEach(doc=>{

robots.push({...doc.data(),id:doc.id})

})

renderRobotList()

})

}

////////////////////////
// ROBOT LIST
////////////////////////

function renderRobotList(){

if(!currentUser)return

let container=document.getElementById("robotList")

let myRobots=robots.filter(r=>r.owner==currentUser.uid)

let html=""

for(let r of myRobots){

html+=`

<div class="robotItem">

Robot ${r.id.substring(0,5)}<br>
Resources: ${r.resources}

<br><br>

<button onclick="selectRobot('${r.id}')">Edit</button>
<button onclick="deleteRobot('${r.id}')">Delete</button>

</div>

`

}

container.innerHTML=html

}

function selectRobot(id){

let robot=robots.find(r=>r.id==id)

if(!robot)return

selectedRobot=robot

document.getElementById("code").value=robot.code

updateStats()

}

function deleteRobot(id){

db.collection("robots").doc(id).delete()

}

////////////////////////
// ROBOT ACTIONS
////////////////////////

function move(robot,dx,dy){

robot.x+=dx
robot.y+=dy

robot.x=constrain(robot.x,0,gridSize-1)
robot.y=constrain(robot.y,0,gridSize-1)

}

function moveRandom(robot){

let d=floor(random(4))

if(d==0)move(robot,1,0)
if(d==1)move(robot,-1,0)
if(d==2)move(robot,0,1)
if(d==3)move(robot,0,-1)

}

function scan(robot,type){

if(type=="resource"){

for(let r of resources){

if(r.x==robot.x && r.y==robot.y){
return true
}

}

}

return false

}

function mine(robot){

for(let r of resources){

if(r.x==robot.x && r.y==robot.y){

if(r.amount>0){

robot.resources+=1
r.amount-=1

}

}

}

}

////////////////////////
// SIMULATION
////////////////////////

function simulateRobot(robot){

let moveRandomFn=()=>moveRandom(robot)
let mineFn=()=>mine(robot)
let scanFn=(t)=>scan(robot,t)

try{

const func=new Function(

"moveRandom",
"mine",
"scan",

robot.code

)

func(

moveRandomFn,
mineFn,
scanFn

)

}catch(e){

}

}

////////////////////////
// DRAW
////////////////////////

function draw(){

background(20)

drawGrid()

drawResources()

drawRobots()

if(frameCount%30==0){

updateWorld()

}

}

function drawGrid(){

stroke(40)

for(let x=0;x<gridSize;x++){

for(let y=0;y<gridSize;y++){

rect(x*tile,y*tile,tile,tile)

}

}

}

function drawResources(){

noStroke()

fill("green")

for(let r of resources){

if(r.amount>0)
rect(r.x*tile,r.y*tile,tile,tile)

}

}

function drawRobots(){

for(let robot of robots){

if(robot.owner==currentUser?.uid){
fill("cyan")
}else{
fill("red")
}

rect(robot.x*tile,robot.y*tile,tile,tile)

}

}

////////////////////////
// UPDATE WORLD
////////////////////////

function updateWorld(){

for(let robot of robots){

simulateRobot(robot)

db.collection("robots").doc(robot.id).update({

x:robot.x,
y:robot.y,
resources:robot.resources

})

}

updateStats()

}

////////////////////////
// STATS
////////////////////////

function updateStats(){

let myRobots=robots.filter(r=>r.owner==currentUser?.uid)

let totalResources=0

for(let r of myRobots){
totalResources+=r.resources
}

let html=`

Robots: ${myRobots.length}<br>
Resources: ${totalResources}

`

if(selectedRobot){

html+=`

<br><br>
Selected Robot<br>
Owner: ${selectedRobot.name}<br>
Resources: ${selectedRobot.resources}

`

}

document.getElementById("stats").innerHTML=html

}

////////////////////////
// SAVE CODE
////////////////////////

function saveCode(){

if(!selectedRobot){

alert("Select a robot")

return

}

if(selectedRobot.owner!=currentUser.uid){

alert("Not your robot")

return

}

let newCode=document.getElementById("code").value

db.collection("robots")
.doc(selectedRobot.id)
.update({
code:newCode
})

selectedRobot.code=newCode

alert("Code Updated")

}

</script>

</body>
</html>
