<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CodeWorld</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;overflow:hidden;}
#panel{position:absolute;right:0;top:0;width:360px;height:100%;background:#1e1e1e;padding:15px;overflow:auto;}
textarea{width:100%;height:180px;background:black;color:#00ff88;font-family:monospace;}
button{width:100%;padding:8px;margin-top:6px;background:#333;border:none;color:white;cursor:pointer;}
button:hover{background:#555;}
.robotItem{background:#222;padding:10px;margin-bottom:8px;}
#stats,#leaderboard{background:#000;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<div id="panel">
<h2>🌍 CodeWorld</h2>
<div id="user">Not logged</div>
<button onclick="login()">Login Google</button>
<button onclick="spawnRobot()">Spawn Robot</button>

<h3>My Robots</h3>
<div id="robotList"></div>

<h3>Robot Code</h3>
<textarea id="code">
if(scan("resource")){
  mine()
}else{
  let enemy=scanEnemy()
  if(enemy){ attack(enemy) }
  else{ moveRandom() }
}

if(resources>50){
  spawnChild(`
    if(scan("resource")){ mine() } else{ moveRandom() }
  `)
}
</textarea>
<button onclick="saveCode()">Save Code</button>

<div id="stats"></div>
<div id="leaderboard"></div>
</div>
<button onclick="showGuide()">📖 Guide</button>
<div id="guide" style="display:none; background:#222; padding:10px; margin-top:10px; max-height:200px; overflow:auto;"></div>
<button onclick="document.getElementById('guide').style.display='none'">Close Guide</button>

<script>

////////////////////////
// FIREBASE
////////////////////////
const firebaseConfig = {
  apiKey: "AIzaSyCOHwfHnIJOrnqlNHsAlMH9MI3Hx7M7wcw",
  authDomain: "carcode-58d5d.firebaseapp.com",
  projectId: "carcode-58d5d",
  storageBucket: "carcode-58d5d.appspot.com",
  messagingSenderId: "1034810624105",
  appId: "1:1034810624105:web:4e960e4864ee332e63baf8"
};
firebase.initializeApp(firebaseConfig)
const auth=firebase.auth()
const db=firebase.firestore()

let currentUser=null
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user
    document.getElementById("user").innerText="Player: "+user.displayName
    renderRobotList()
  }
})

function login(){ const provider=new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider); }

////////////////////////
// WORLD
////////////////////////
const gridSize=40, tile=20
let robots=[], resources=[], selectedRobot=null

function setup(){
  createCanvas(window.innerWidth-360,window.innerHeight)
  generateResources()
  loadRobots()
}

////////////////////////
// RESOURCES
////////////////////////
function generateResources(){
  for(let i=0;i<200;i++){
    resources.push({x:floor(random(gridSize)),y:floor(random(gridSize)),amount:100})
  }
}

////////////////////////
// ROBOTS
////////////////////////
function spawnRobot(){
  if(!currentUser)return alert("login first")
  const code=document.getElementById("code").value
  const robot={
    owner:currentUser.uid,
    name:currentUser.displayName,
    x:floor(random(gridSize)),
    y:floor(random(gridSize)),
    energy:100,
    resources:0,
    code:code
  }
  db.collection("robots").add(robot)
}

function loadRobots(){
  db.collection("robots").onSnapshot(snap=>{
    robots=[]
    snap.forEach(doc=>{
      robots.push({...doc.data(),id:doc.id})
    })
    renderRobotList()
  })
}

////////////////////////
// ROBOT LIST
////////////////////////
function renderRobotList(){
  if(!currentUser)return
  let container=document.getElementById("robotList")
  let myRobots=robots.filter(r=>r.owner==currentUser.uid)
  let html=""
  for(let r of myRobots){
    html+=`<div class="robotItem">
      Robot ${r.id.substring(0,5)}<br>Resources: ${r.resources}<br><br>
      <button onclick="selectRobot('${r.id}')">Edit</button>
      <button onclick="deleteRobot('${r.id}')">Delete</button>
    </div>`
  }
  container.innerHTML=html
}

function selectRobot(id){
  let robot=robots.find(r=>r.id==id)
  if(!robot)return
  selectedRobot=robot
  document.getElementById("code").value=robot.code
  updateStats()
}

function deleteRobot(id){ db.collection("robots").doc(id).delete() }

////////////////////////
// ROBOT ACTIONS
////////////////////////
function move(robot,dx,dy){
  robot.x+=dx; robot.y+=dy
  robot.x=constrain(robot.x,0,gridSize-1)
  robot.y=constrain(robot.y,0,gridSize-1)
}

function moveRandom(robot){
  let d=floor(random(4))
  if(d==0)move(robot,1,0)
  if(d==1)move(robot,-1,0)
  if(d==2)move(robot,0,1)
  if(d==3)move(robot,0,-1)
}

function scan(robot,type){
  if(type=="resource"){
    for(let r of resources){ if(r.x==robot.x && r.y==robot.y && r.amount>0) return true }
  }
  if(type=="enemy"){
    for(let r of robots){
      if(r.owner!==robot.owner && r.x==robot.x && r.y==robot.y) return r
    }
  }
  return false
}

function mine(robot){
  for(let r of resources){
    if(r.x==robot.x && r.y==robot.y && r.amount>0){
      robot.resources+=1
      r.amount-=1
    }
  }
}

function scanEnemy(robot){
  for(let r of robots){
    if(r.owner!==robot.owner){
      let dx=r.x-robot.x, dy=r.y-robot.y
      if(abs(dx)<=1 && abs(dy)<=1) return r
    }
  }
  return null
}

function attack(robot,target){
  if(target){
    target.energy-=10
    if(target.energy<=0){
      target.x=floor(random(gridSize))
      target.y=floor(random(gridSize))
      target.energy=50
      target.resources=0
    }
  }
}

function spawnChild(robot,code){
  if(robot.resources>=50){
    robot.resources-=50
    const child={...robot}
    child.x=floor(random(gridSize))
    child.y=floor(random(gridSize))
    child.energy=100
    child.resources=0
    child.code=code
    db.collection("robots").add(child)
  }
}

////////////////////////
// SIMULATION
////////////////////////
function simulateRobot(robot){
  let moveRandomFn=()=>moveRandom(robot)
  let mineFn=()=>mine(robot)
  let scanFn=(t)=>scan(robot,t)
  let scanEnemyFn=()=>scanEnemy(robot)
  let attackFn=(target)=>attack(robot,target)
  let spawnChildFn=(code)=>spawnChild(robot,code)
  try{
    const func=new Function("moveRandom","mine","scan","scanEnemy","attack","spawnChild","resources",robot.code)
    func(moveRandomFn,mineFn,scanFn,scanEnemyFn,attackFn,spawnChildFn,robot.resources)
  }catch(e){}
}

////////////////////////
// DRAW
////////////////////////
function draw(){
  background(20)
  drawGrid()
  drawResources()
  drawRobots()
  if(frameCount%30==0) updateWorld()
}

function drawGrid(){
  stroke(40)
  for(let x=0;x<gridSize;x++){
    for(let y=0;y<gridSize;y++){
      rect(x*tile,y*tile,tile,tile)
    }
  }
}

function drawResources(){
  noStroke()
  fill("green")
  for(let r of resources){ if(r.amount>0) rect(r.x*tile,r.y*tile,tile,tile) }
}

function drawRobots(){
  for(let robot of robots){
    if(robot.owner==currentUser?.uid) fill("cyan")
    else fill("red")
    rect(robot.x*tile,robot.y*tile,tile,tile)
    fill("white")
    textSize(12)
    text(robot.resources,robot.x*tile+2,robot.y*tile+12)
  }
}

////////////////////////
// UPDATE WORLD
////////////////////////
function updateWorld(){
  for(let robot of robots){
    simulateRobot(robot)
    db.collection("robots").doc(robot.id).update({
      x:robot.x,
      y:robot.y,
      energy:robot.energy,
      resources:robot.resources
    })
  }
  updateStats()
  updateLeaderboard()
}

////////////////////////
// STATS & LEADERBOARD
////////////////////////
function updateStats(){
  if(!currentUser)return
  let myRobots=robots.filter(r=>r.owner==currentUser?.uid)
  let totalResources=myRobots.reduce((sum,r)=>sum+r.resources,0)
  let html=`Robots: ${myRobots.length}<br>Resources: ${totalResources}`
  if(selectedRobot){
    html+=`<br><br>Selected Robot<br>Owner: ${selectedRobot.name}<br>Resources: ${selectedRobot.resources}<br>Energy: ${selectedRobot.energy}`
  }
  document.getElementById("stats").innerHTML=html
}

function updateLeaderboard(){
  let sorted=robots.sort((a,b)=>b.resources-a.resources)
  let html="<h3>🏆 Leaderboard</h3>"
  for(let r of sorted.slice(0,10)){
    html+=`${r.name} - Resources: ${r.resources} - Energy: ${r.energy}<br>`
  }
  document.getElementById("leaderboard").innerHTML=html
}

////////////////////////
// SAVE CODE
////////////////////////
function saveCode(){
  if(!selectedRobot){ alert("Select a robot"); return }
  if(selectedRobot.owner!=currentUser.uid){ alert("Not your robot"); return }
  let newCode=document.getElementById("code").value
  db.collection("robots").doc(selectedRobot.id).update({ code:newCode })
  selectedRobot.code=newCode
  alert("Code Updated")
}

////////////////////////
// GUIA
////////////////////////

function showGuide(){
  const guideDiv = document.getElementById("guide");
  guideDiv.style.display = "block";
  guideDiv.innerHTML = `
<h3>CodeWorld Guide 🌍</h3>
<p>Welcome to CodeWorld! In this game, you program your robots to survive, gather resources, and compete with other players.</p>

<b>Robot Programming</b><br>
- Write code in the <i>Robot Code</i> textarea.<br>
- Example actions you can use in your code:
<ul>
<li><b>moveRandom()</b> - Move to a random adjacent tile.</li>
<li><b>mine()</b> - Collect resources if present on your current tile.</li>
<li><b>scan('resource')</b> - Returns true if a resource is in your current tile.</li>
<li><b>scanEnemy()</b> - Returns the nearest enemy robot (1 tile around).</li>
<li><b>attack(target)</b> - Attack an enemy robot.</li>
<li><b>spawnChild(code)</b> - Create a child robot with 50 resources.</li>
</ul>

<b>World Rules</b><br>
- Robots have <b>energy</b> and <b>resources</b>.
- If energy reaches 0, robots respawn at a random location with 50 energy.
- Resources are finite and need to be mined to gain points.
- Leaderboard shows the top robots by resources.

<b>Tips</b><br>
- Program your bot to survive and gather efficiently.
- Avoid enemies if your energy is low.
- You can have multiple robots and upgrade their code.
- Experiment with conditional logic to create smarter bots!

<p>Have fun coding and surviving!</p>
  `;
}

</script>
</body>
</html>
