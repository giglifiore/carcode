<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Programming Online</title>

<script src="p5.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
}

#panel{
position:absolute;
right:0;
top:0;
width:360px;
height:100%;
background:#1e1e1e;
padding:15px;
overflow:auto;
}

textarea{
width:100%;
height:140px;
background:black;
color:#00ff88;
font-family:monospace;
}

button{
width:100%;
padding:8px;
margin-top:6px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#555;
}

#stats{
margin-top:10px;
background:#000;
padding:10px;
}

</style>

</head>

<body>

<div id="panel">

<h2>Car Programming Online</h2>

<div id="user">Not logged</div>

<button onclick="login()">Login Google</button>

<h3 id="partTitle">Select Part</h3>

<textarea id="code"></textarea>

<button onclick="saveCode()">Save Code</button>

<button onclick="toggleSim()">Start Simulation</button>

<button onclick="uploadBuild()">Share Build</button>

<button onclick="loadBuilds()">Load Community Builds</button>

<div id="builds"></div>

<div id="stats"></div>

</div>

<script>

/////////////////////
// FIREBASE CONFIG
/////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCOHwfHnIJOrnqlNHsAlMH9MI3Hx7M7wcw",
  authDomain: "carcode-58d5d.firebaseapp.com",
  projectId: "carcode-58d5d",
  storageBucket: "carcode-58d5d.appspot.com",
  messagingSenderId: "1034810624105",
  appId: "1:1034810624105:web:4e960e4864ee332e63baf8"
};

firebase.initializeApp(firebaseConfig)

const auth = firebase.auth()
const db = firebase.firestore()

let currentUser=null

function login(){

const provider = new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)
.then(result=>{

currentUser=result.user

document.getElementById("user").innerText =
"Player: "+currentUser.displayName

})

}

/////////////////////
// GAME ENGINE
/////////////////////

let running=false
let selectedPart=null

let car={
rpm:900,
speed:0,
boost:0,
air:1,
fuel:1,
torque:0
}

let parts=[

{
name:"Turbo",
x:230,
y:200,
w:60,
h:40,
power:5,
code:`boost += power * 0.05
if(rpm > 3000){ boost += 0.5 }
air += boost * 0.5`
},

{
name:"Engine",
x:310,
y:210,
w:80,
h:50,
power:10,
code:`torque += power * fuel * air * 5`
},

{
name:"Wheels",
x:450,
y:260,
w:80,
h:40,
grip:1.2,
code:`speed += torque * grip * 0.01`
}

]

function setup(){

createCanvas(window.innerWidth,window.innerHeight)

}

function draw(){

background(20)

drawCar()

if(running){
simulate()
}

drawStats()

}

function drawCar(){

fill(80)
rect(200,240,350,60)

for(let p of parts){

fill(120)
rect(p.x,p.y,p.w,p.h)

fill(255)
text(p.name,p.x+5,p.y+20)

}

}

function mousePressed(){

for(let p of parts){

if(mouseX>p.x && mouseX<p.x+p.w &&
mouseY>p.y && mouseY<p.y+p.h){

selectedPart=p

document.getElementById("partTitle").innerText=p.name
document.getElementById("code").value=p.code

}

}

}

function saveCode(){

if(selectedPart){

selectedPart.code=document.getElementById("code").value

}

}

function toggleSim(){

running=!running

}

function simulate(){

car.boost=0
car.air=1
car.torque=0

for(let p of parts){

try{

let rpm=car.rpm
let boost=car.boost
let air=car.air
let fuel=car.fuel
let torque=car.torque
let speed=car.speed
let power=p.power||0
let grip=p.grip||1

eval(p.code)

car.boost=boost
car.air=air
car.torque=torque
car.speed=speed

}catch(e){
console.log(e)
}

}

car.speed*=0.99

car.rpm=900 + car.speed*45

}

function drawStats(){

let s=`
RPM: ${car.rpm.toFixed(0)}<br>
Speed: ${car.speed.toFixed(2)}<br>
Boost: ${car.boost.toFixed(2)}<br>
Air: ${car.air.toFixed(2)}<br>
Torque: ${car.torque.toFixed(2)}
`

document.getElementById("stats").innerHTML=s

}

/////////////////////
// COMMUNITY
/////////////////////

async function uploadBuild(){

if(!currentUser) return alert("Login first")

await db.collection("builds").add({

user:currentUser.displayName,

turbo:parts[0].code,
engine:parts[1].code,
wheels:parts[2].code,

rpm:car.rpm

})

alert("Build Shared!")

}

async function loadBuilds(){

let snap = await db.collection("builds").get()

let html=""

snap.forEach(doc=>{

let b=doc.data()

html+=`
<button onclick='applyBuild(${JSON.stringify(b)})'>
${b.user} - ${Math.floor(b.rpm)} RPM
</button>
`

})

document.getElementById("builds").innerHTML=html

}

function applyBuild(b){

parts[0].code=b.turbo
parts[1].code=b.engine
parts[2].code=b.wheels

alert("Build Loaded")

}

</script>

</body>
</html>
